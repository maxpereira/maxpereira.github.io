<!DOCTYPE html>
<html lang="en">
<head>

  <script type="text/javascript">
  var toggle = 0;
  function popModal(){
    var elem = document.getElementById("emailButton");
    if (toggle == 0) {
      elem.setAttribute("style","opacity: 1;")
      toggle = 1;
    } else {
      elem.setAttribute("style","opacity: 0;")
      toggle = 0;
    }
  }
  </script>

  <!-- Basic Page Needs
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <meta charset="utf-8">
  <title>Max Pereira</title>
  <meta name="description" content="">
  <meta name="author" content="">

  <!-- Mobile Specific Metas
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- FONT
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <link href="//fonts.googleapis.com/css?family=Raleway:400,300,600" rel="stylesheet" type="text/css">

  <!-- CSS
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <link rel="stylesheet" href="css/normalize.css">
  <link rel="stylesheet" href="css/skeleton.css">
  <link rel="stylesheet" href="css/extra.css">
  <link href="https://use.fontawesome.com/releases/v5.0.6/css/all.css" rel="stylesheet">

  <!-- Favicon
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <link rel="icon" type="image/png" href="images/favicon.png">

</head>
<body>

  <!-- Primary Page Layout
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
  <div class="container">
    <div class="row">
      <div class="one-half column" style="margin-top: 20%">
        <img class="logo" src="images/avatar.jpg" alt="Avatar" width=230px height=230px/>
        <h2>Max Pereira</h2>
        <p>I'm a first-year Computer Science Student at <a href="https://ucsc.edu" target="_blank">UC Santa Cruz.</a><br>Let's connect.</p>
        <!-- Email Button -->
        <div class="tooltip">
        <a class="button button-icon" onmouseover="popModal();" onmouseout="popModal();">
            <i class="fa fa-envelope"></i>
            <span class="tooltiptext" id="emailButton"><image src="images/hello.png"></span>
        </a>
        </div>
        <!-- LinkedIn Button -->
        <a class="button button-icon" href="https://www.linkedin.com/in/maxwellpereira/" target="_blank">
          <i class="fab fa-linkedin"></i>
        </a>
        <!-- GitHub Button -->
        <a class="button button-icon" href="https://github.com/maxpereira/" target="_blank">
            <i class="fab fa-github"></i>
        </a>
      </div>
    </div>
  </div>

<!-- End Document
  –––––––––––––––––––––––––––––––––––––––––––––––––– -->
</body>
</html>
